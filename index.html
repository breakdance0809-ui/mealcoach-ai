<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MealCoach AI</title>
</head>
<body>
<h1>MealCoach AI</h1>

<p>体重</p>
<input type="number" id="weight">

<p>歩数</p>
<input type="number" id="steps">

<button onclick="analyze()">診断する</button>

<p id="result"></p>

<script>
function analyze(){
  let weight = document.getElementById("weight").value;
  let steps = document.getElementById("steps").value;

  document.getElementById("result").innerHTML =
  "体重 " + weight + "kg<br>歩数 " + steps + "歩<br><br>今日も頑張りましょう！";
}
</script>

</body>
</html>
